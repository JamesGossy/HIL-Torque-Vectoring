name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc make

      - name: Build HIL simulation
        run: make -C HIL_Firmware

      - name: Build ECU firmware (standalone boundary check)
        run: make -C ECU_Firmware

      - name: Run unit tests
        run: make -C HIL_Firmware test
